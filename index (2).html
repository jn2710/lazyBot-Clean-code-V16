<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Arena Survival</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    overflow: hidden;
    background: #050816;
    font-family: Arial, sans-serif;
    color: white;
  }
  canvas {
    display: block;
    background:
      radial-gradient(circle at center, #0b1430 0%, #04060f 70%);
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    user-select: none;
    line-height: 1.5;
  }
  #menu {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    flex-direction: column;
    gap: 14px;
  }
  button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    background: #00d4ff;
    color: black;
    font-weight: bold;
  }
  button:hover {
    background: #7deeff;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="health">Health: 100</div>
  <div id="wave">Wave: 1</div>
  <div>Move: WASD / Arrow Keys</div>
  <div>Shoot: Mouse</div>
</div>

<div id="menu">
  <h1>NEON ARENA</h1>
  <p>Survive endless enemy waves.</p>
  <button id="startBtn">Start Game</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const ui = {
  score: document.getElementById("score"),
  health: document.getElementById("health"),
  wave: document.getElementById("wave")
};

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");

let keys = {};
let mouse = { x: 0, y: 0, down: false };
let bullets = [];
let enemies = [];
let particles = [];
let powerups = [];
let score = 0;
let gameRunning = false;
let spawnTimer = 0;
let wave = 1;
let enemyCount = 5;
 let screenShake = 0;

const player = {
  x: 0,
  y: 0,
  radius: 18,
  speed: 4,
  health: 100,
  maxHealth: 100,
  fireRate: 180,
  damage: 1,
  lastShot: 0,
 dashCooldown: 0,
 dashSpeed: 14,
  color: "#00ffe5"
};

function resetGame() {
  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  score = 0;
  wave = 1;
  enemyCount = 5;
  spawnTimer = 0;

  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.health = player.maxHealth;
}

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mousedown", () => mouse.down = true);
window.addEventListener("mouseup", () => mouse.down = false);

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) {
    x = rand(0, canvas.width);
    y = -30;
  } else if (side === 1) {
    x = canvas.width + 30;
    y = rand(0, canvas.height);
  } else if (side === 2) {
    x = rand(0, canvas.width);
    y = canvas.height + 30;
  } else {
    x = -30;
    y = rand(0, canvas.height);
  }

  enemies.push({
    x,
    y,
    radius: rand(12, 24),
    speed: rand(1.1, 2.2) + wave * 0.08,
    health: 2 + wave * 0.5,
    color: `hsl(${rand(0,360)}, 90%, 60%)`
  });
}

function shoot() {
  const now = Date.now();
  if (now - player.lastShot < player.fireRate) return;

  player.lastShot = now;

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * 9,
    vy: Math.sin(angle) * 9,
    radius: 5,
    life: 70
  });
}

function spawnExplosion(x, y, color, amount = 12) {
  for (let i = 0; i < amount; i++) {
    particles.push({
      x,
      y,
      vx: rand(-3, 3),
      vy: rand(-3, 3),
      life: rand(20, 40),
      size: rand(2, 5),
      color
    });
  }
}

function spawnPowerup(x, y) {
  const type = Math.random() < 0.5 ? "heal" : "rapid";

  powerups.push({
    x,
    y,
    radius: 12,
    type,
    pulse: 0
  });
}

function updatePlayer() {
  let dx = 0;
  let dy = 0;

  if (keys["w"] || keys["arrowup"]) dy--;
  if (keys["s"] || keys["arrowdown"]) dy++;
  if (keys["a"] || keys["arrowleft"]) dx--;
  if (keys["d"] || keys["arrowright"]) dx++;

  const len = Math.hypot(dx, dy);
  if (len > 0) {
    dx /= len;
    dy /= len;
  }
 if (keys["shift"] && player.dashCooldown <= 0) {
  player.x += dx * player.dashSpeed;
  player.y += dy * player.dashSpeed;

  player.dashCooldown = 60;

  spawnExplosion(player.x, player.y, "#00ffff", 20);
}

if (player.dashCooldown > 0) {
  player.dashCooldown--;
}

  player.x += dx * player.speed;
  player.y += dy * player.speed;

  player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

  if (mouse.down) shoot();
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];

    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    if (
      b.life <= 0 ||
      b.x < -50 ||
      b.y < -50 ||
      b.x > canvas.width + 50 ||
      b.y > canvas.height + 50
    ) {
      bullets.splice(i, 1);
      continue;
    }

    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];

      if (distance(b, e) < b.radius + e.radius) {
        e.health -= player.damage;
        bullets.splice(i, 1);
        spawnExplosion(b.x, b.y, "#ffffff", 5);

        if (e.health <= 0) {
         screenShake = 10;
          score += 10;
          spawnExplosion(e.x, e.y, e.color, 20);

          if (Math.random() < 0.18) {
            spawnPowerup(e.x, e.y);
          }

          enemies.splice(j, 1);
        }
        break;
      }
    }
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed;
    e.y += Math.sin(angle) * e.speed;

    if (distance(player, e) < player.radius + e.radius) {
      player.health -= 0.2;
      spawnExplosion(player.x, player.y, "#ff0033", 2);
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    p.vx *= 0.98;
    p.vy *= 0.98;

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function updatePowerups() {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];

    p.pulse += 0.08;

    if (distance(player, p) < player.radius + p.radius) {
      if (p.type === "heal") {
        player.health = Math.min(player.maxHealth, player.health + 25);
      } else {
        player.fireRate = 90;

        setTimeout(() => {
          player.fireRate = 180;
        }, 5000);
      }

      spawnExplosion(p.x, p.y, "#ffff00", 16);
      powerups.splice(i, 1);
    }
  }
}

function drawGrid() {
  const size = 50;
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += size) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += size) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  ctx.rotate(angle);

  ctx.shadowBlur = 20;
  ctx.shadowColor = player.color;

  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.fillRect(8, -4, 16, 8);

  ctx.restore();
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#ffffff";
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.shadowBlur = 16;
    ctx.shadowColor = e.color;
    ctx.fillStyle = e.color;

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "red";
    ctx.fillRect(e.x - e.radius, e.y - e.radius - 10, e.radius * 2, 4);

    ctx.fillStyle = "lime";
    ctx.fillRect(
      e.x - e.radius,
      e.y - e.radius - 10,
      (e.health / (2 + wave * 0.5)) * e.radius * 2,
      4
    );
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  });
}

function drawPowerups() {
  powerups.forEach(p => {
    const size = p.radius + Math.sin(p.pulse) * 3;

    ctx.shadowBlur = 20;
    ctx.shadowColor = p.type === "heal" ? "#00ff00" : "#ffff00";
    ctx.fillStyle = p.type === "heal" ? "#00ff00" : "#ffff00";

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.fillText(p.type === "heal" ? "+" : "R", p.x, p.y + 4);
  });
}

function updateUI() {
  ui.score.textContent = `Score: ${score}`;
  ui.health.textContent = `Health: ${Math.max(0, Math.floor(player.health))}`;
  ui.wave.textContent = `Wave: ${wave}`;
}

function nextWaveCheck() {
  if (enemies.length === 0) {
    wave++;
    enemyCount += 2;

    for (let i = 0; i < enemyCount; i++) {
      setTimeout(() => {
        spawnEnemy();
      }, i * 250);
    }
  }
}

function drawBackgroundGlow() {
  const grad = ctx.createRadialGradient(
    player.x,
    player.y,
    0,
    player.x,
    player.y,
    260
  );

  grad.addColorStop(0, "rgba(0,255,255,0.12)");
  grad.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function gameOver() {
  gameRunning = false;

  menu.style.display = "flex";
  menu.innerHTML = `
    <h1>GAME OVER</h1>
    <h2>Score: ${score}</h2>
    <button id="restartBtn">Play Again</button>
  `;

  document.getElementById("restartBtn").onclick = () => {
    menu.innerHTML = `
      <h1>NEON ARENA</h1>
      <p>Survive endless enemy waves.</p>
      <button id="startBtn">Start Game</button>
    `;

    document.getElementById("startBtn").onclick = startGame;
    startGame();
  };
}

function update() {
  updatePlayer();
  updateBullets();
  updateEnemies();
  updateParticles();
  updatePowerups();
  updateUI();
  nextWaveCheck();

  spawnTimer++;

  if (spawnTimer > 240) {
    spawnTimer = 0;

    if (enemies.length < enemyCount) {
      spawnEnemy();
    }
  }

  if (player.health <= 0) {
    gameOver();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.save();

if (screenShake > 0) {
  ctx.translate(
    rand(-screenShake, screenShake),
    rand(-screenShake, screenShake)
  );

  screenShake *= 0.9;
}
  drawGrid();
  drawBackgroundGlow();
  drawPowerups();
  drawParticles();
  drawBullets();
  drawEnemies();
  drawPlayer();

 ctx.restore();
}

function loop() {
  if (!gameRunning) return;

  update();
  draw();

  requestAnimationFrame(loop);
}

function startGame() {
  resetGame();

  for (let i = 0; i < enemyCount; i++) {
    spawnEnemy();
  }

  menu.style.display = "none";
  gameRunning = true;
  loop();
}

startBtn.onclick = startGame;
</script>
</body>
</html>
