<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Arena Survival OMEGA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#040712;
  font-family:Arial,sans-serif;
  color:white;
}

canvas{
  display:block;
  background:
    radial-gradient(circle at center,#0d1738 0%,#050816 65%);
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  z-index:5;
  font-size:18px;
  line-height:1.6;
  user-select:none;
}

#menu,
#upgradeMenu{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.72);
  gap:15px;
  z-index:10;
}

#upgradeMenu{
  display:none;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  background:#00d4ff;
  color:black;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:#8df3ff;
}

.upgradeBtn{
  width:320px;
}

h1{
  font-size:58px;
  color:#00ffff;
  text-shadow:0 0 25px #00ffff;
}

.panel{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="health">Health: 100</div>
  <div id="shield">Shield: 0</div>
  <div id="wave">Wave: 1</div>
  <div id="level">Level: 1</div>
  <div id="xp">XP: 0 / 100</div>
  <div id="weapon">Weapon: Blaster</div>
  <div id="coins">Coins: 0</div>
  <div>Move: WASD / Arrows</div>
  <div>Dash: SHIFT</div>
  <div>Shoot: Mouse</div>
  <div>Bomb: SPACE</div>
</div>

<div id="menu">
  <h1>NEON ARENA OMEGA</h1>

  <div class="panel">
    <p>Survive endless waves.</p>
    <p>Fight elite enemies and bosses.</p>
    <p>Unlock evolving weapons.</p>
    <br>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<div id="upgradeMenu">

  <h1>LEVEL UP</h1>

  <button class="upgradeBtn" data-upgrade="damage">
    +1 Damage
  </button>

  <button class="upgradeBtn" data-upgrade="speed">
    +0.5 Speed
  </button>

  <button class="upgradeBtn" data-upgrade="firerate">
    Faster Fire Rate
  </button>

  <button class="upgradeBtn" data-upgrade="multishot">
    +1 Multi Shot
  </button>

  <button class="upgradeBtn" data-upgrade="shield">
    +25 Shield
  </button>

  <button class="upgradeBtn" data-upgrade="crit">
    +10% Crit Chance
  </button>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

window.addEventListener("resize",resize);
resize();

const ui = {
  score:document.getElementById("score"),
  health:document.getElementById("health"),
  shield:document.getElementById("shield"),
  wave:document.getElementById("wave"),
  level:document.getElementById("level"),
  xp:document.getElementById("xp"),
  weapon:document.getElementById("weapon"),
  coins:document.getElementById("coins")
};

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");
const upgradeMenu = document.getElementById("upgradeMenu");

let gameRunning = false;

let keys = {};

let mouse = {
  x:0,
  y:0,
  down:false
};

let bullets = [];
let enemies = [];
let particles = [];
let powerups = [];
let enemyLasers = [];
let coinsList = [];
let shockwaves = [];
let trails = [];

let score = 0;
let wave = 1;
let enemyCount = 5;
let spawnTimer = 0;
let screenShake = 0;
let level = 1;
let xp = 0;
let xpNeeded = 100;
let highScore = localStorage.getItem("neonHighscore") || 0;

const player = {
  x:0,
  y:0,
  radius:18,
  speed:4,
  health:100,
  maxHealth:100,
  shield:0,
  fireRate:180,
  damage:1,
  critChance:0.15,
  dashCooldown:0,
  dashSpeed:16,
  lastShot:0,
  color:"#00ffe5",
  multiShot:1,
  bombs:3,
  weapon:"Blaster"
};

window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

window.addEventListener("mousemove",e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mousedown",()=>{
  mouse.down = true;
});

window.addEventListener("mouseup",()=>{
  mouse.down = false;
});

function rand(min,max){
  return Math.random()*(max-min)+min;
}

function distance(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function resetGame(){

  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  enemyLasers = [];
  coinsList = [];
  shockwaves = [];
  trails = [];

  score = 0;
  wave = 1;
  enemyCount = 5;
  level = 1;
  xp = 0;
  xpNeeded = 100;

  player.x = canvas.width/2;
  player.y = canvas.height/2;

  player.health = 100;
  player.maxHealth = 100;
  player.shield = 0;

  player.damage = 1;
  player.speed = 4;
  player.fireRate = 180;
  player.critChance = 0.15;
  player.multiShot = 1;
  player.weapon = "Blaster";
}

function spawnExplosion(x,y,color,amount=10){

  for(let i=0;i<amount;i++){

    particles.push({
      x,
      y,
      vx:rand(-5,5),
      vy:rand(-5,5),
      size:rand(2,6),
      color,
      life:rand(20,50)
    });

  }

}

function spawnShockwave(x,y,color){

  shockwaves.push({
    x,
    y,
    radius:10,
    max:200,
    color,
    life:40
  });

}

function createEnemy(type){

  const side = Math.floor(Math.random()*4);

  let x,y;

  if(side===0){
    x = rand(0,canvas.width);
    y = -40;
  }else if(side===1){
    x = canvas.width+40;
    y = rand(0,canvas.height);
  }else if(side===2){
    x = rand(0,canvas.width);
    y = canvas.height+40;
  }else{
    x = -40;
    y = rand(0,canvas.height);
  }

  let enemy = {
    x,
    y,
    vx:0,
    vy:0,
    cooldown:120
  };

  switch(type){

    case "tank":
      Object.assign(enemy,{
        type,
        radius:35,
        speed:0.8,
        health:18+wave,
        maxHealth:18+wave,
        color:"#ff8800",
        damage:0.5
      });
    break;

    case "sniper":
      Object.assign(enemy,{
        type,
        radius:16,
        speed:1.2,
        health:4+wave*0.3,
        maxHealth:4+wave*0.3,
        color:"#ff0044",
        shooter:true,
        cooldown:80
      });
    break;

    case "splitter":
      Object.assign(enemy,{
        type,
        radius:22,
        speed:1.6,
        health:8,
        maxHealth:8,
        color:"#aa66ff"
      });
    break;

    case "dasher":
      Object.assign(enemy,{
        type,
        radius:14,
        speed:3.8,
        health:3,
        maxHealth:3,
        color:"#00ff88",
        dashTimer:rand(30,100)
      });
    break;

    case "boss":
      Object.assign(enemy,{
        type,
        radius:80,
        speed:0.8,
        health:250+(wave*25),
        maxHealth:250+(wave*25),
        color:"#ff0000",
        shooter:true,
        cooldown:30
      });
    break;

    default:
      Object.assign(enemy,{
        type:"basic",
        radius:rand(12,24),
        speed:rand(1.1,2.3)+(wave*0.08),
        health:2+(wave*0.5),
        maxHealth:2+(wave*0.5),
        color:`hsl(${rand(0,360)},90%,60%)`
      });

  }

  enemies.push(enemy);

}

function spawnEnemy(){

  const roll = Math.random();

  if(wave % 5 === 0 && enemies.filter(e=>e.type==="boss").length===0){
    createEnemy("boss");
    return;
  }

  if(roll < 0.4){
    createEnemy("basic");
  }
  else if(roll < 0.58){
    createEnemy("sniper");
  }
  else if(roll < 0.73){
    createEnemy("tank");
  }
  else if(roll < 0.88){
    createEnemy("splitter");
  }
  else{
    createEnemy("dasher");
  }

}

function shoot(){

  const now = Date.now();

  if(now-player.lastShot < player.fireRate){
    return;
  }

  player.lastShot = now;

  const base =
    Math.atan2(
      mouse.y-player.y,
      mouse.x-player.x
    );

  for(let i=0;i<player.multiShot;i++){

    const spread =
      (i-(player.multiShot-1)/2)*0.18;

    const angle = base+spread;

    const crit =
      Math.random()<player.critChance;

    bullets.push({
      x:player.x,
      y:player.y,
      vx:Math.cos(angle)*10,
      vy:Math.sin(angle)*10,
      radius:crit ? 8 : 5,
      damage:crit ? player.damage*3 : player.damage,
      crit,
      life:70
    });

  }

}

function useBomb(){

  if(player.bombs<=0) return;

  player.bombs--;

  screenShake = 25;

  spawnShockwave(player.x,player.y,"#00ffff");

  enemies.forEach(e=>{
    e.health -= 25;
  });

  enemyLasers = [];

  spawnExplosion(player.x,player.y,"#00ffff",80);

}

function updatePlayer(){

  let dx=0;
  let dy=0;

  if(keys["w"] || keys["arrowup"]) dy--;
  if(keys["s"] || keys["arrowdown"]) dy++;
  if(keys["a"] || keys["arrowleft"]) dx--;
  if(keys["d"] || keys["arrowright"]) dx++;

  const len = Math.hypot(dx,dy);

  if(len>0){
    dx/=len;
    dy/=len;
  }

  if(keys[" "]){
    keys[" "] = false;
    useBomb();
  }

  if(keys["shift"] && player.dashCooldown<=0){

    player.x += dx*player.dashSpeed;
    player.y += dy*player.dashSpeed;

    player.dashCooldown = 60;

    spawnExplosion(player.x,player.y,"#00ffff",30);
  }

  if(player.dashCooldown>0){
    player.dashCooldown--;
  }

  player.x += dx*player.speed;
  player.y += dy*player.speed;

  player.x = Math.max(player.radius,Math.min(canvas.width-player.radius,player.x));
  player.y = Math.max(player.radius,Math.min(canvas.height-player.radius,player.y));

  if(mouse.down){
    shoot();
  }

  trails.push({
    x:player.x,
    y:player.y,
    life:15
  });

}

function updateBullets(){

  for(let i=bullets.length-1;i>=0;i--){

    const b = bullets[i];

    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    if(b.life<=0){
      bullets.splice(i,1);
      continue;
    }

    for(let j=enemies.length-1;j>=0;j--){

      const e = enemies[j];

      if(distance(b,e)<b.radius+e.radius){

        e.health -= b.damage;

        spawnExplosion(
          b.x,
          b.y,
          b.crit ? "#ff00ff" : "#ffffff",
          5
        );

        bullets.splice(i,1);

        if(e.health<=0){

          score += e.type==="boss" ? 1000 : 10;
          xp += e.type==="boss" ? 250 : 10;

          spawnExplosion(e.x,e.y,e.color,35);

          screenShake = 12;

          if(Math.random()<0.25){
            spawnPowerup(e.x,e.y);
          }

          coinsList.push({
            x:e.x,
            y:e.y,
            radius:8
          });

          if(e.type==="splitter"){

            for(let k=0;k<3;k++){

              enemies.push({
                type:"mini",
                x:e.x,
                y:e.y,
                radius:10,
                speed:3,
                health:1,
                maxHealth:1,
                color:"#ddbbff"
              });

            }

          }

          enemies.splice(j,1);

          checkLevelUp();
        }

        break;
      }

    }

  }

}

function damagePlayer(amount){

  if(player.shield>0){

    player.shield -= amount;

    if(player.shield<0){

      player.health += player.shield;
      player.shield = 0;
    }

  }else{
    player.health -= amount;
  }

}

function updateEnemies(){

  for(let i=enemies.length-1;i>=0;i--){

    const e = enemies[i];

    const angle =
      Math.atan2(
        player.y-e.y,
        player.x-e.x
      );

    if(e.type==="dasher"){

      e.dashTimer--;

      if(e.dashTimer<=0){

        e.vx = Math.cos(angle)*12;
        e.vy = Math.sin(angle)*12;

        e.dashTimer = rand(60,120);

      }

      e.x += e.vx;
      e.y += e.vy;

      e.vx *= 0.92;
      e.vy *= 0.92;

    }else{

      e.x += Math.cos(angle)*e.speed;
      e.y += Math.sin(angle)*e.speed;

    }

    if(distance(player,e)<player.radius+e.radius){

      damagePlayer(e.damage || 0.2);

      spawnExplosion(player.x,player.y,"#ff0033",4);
    }

    if(e.shooter){

      e.cooldown--;

      if(e.cooldown<=0){

        enemyLasers.push({
          x:e.x,
          y:e.y,
          vx:Math.cos(angle)*(e.type==="boss"?8:6),
          vy:Math.sin(angle)*(e.type==="boss"?8:6),
          radius:e.type==="boss" ? 10 : 4,
          life:120,
          damage:e.type==="boss" ? 20 : 10
        });

        e.cooldown = e.type==="boss" ? 18 : rand(90,180);

      }

    }

  }

}

function updateEnemyLasers(){

  for(let i=enemyLasers.length-1;i>=0;i--){

    const l = enemyLasers[i];

    l.x += l.vx;
    l.y += l.vy;
    l.life--;

    if(distance(player,l)<player.radius+l.radius){

      damagePlayer(l.damage);

      spawnExplosion(player.x,player.y,"#ff0033",15);

      enemyLasers.splice(i,1);
      continue;
    }

    if(l.life<=0){
      enemyLasers.splice(i,1);
    }

  }

}

function spawnPowerup(x,y){

  const types = [
    "heal",
    "rapid",
    "shield",
    "bomb"
  ];

  const type =
    types[Math.floor(Math.random()*types.length)];

  powerups.push({
    x,
    y,
    radius:12,
    type,
    pulse:0
  });

}

function updatePowerups(){

  for(let i=powerups.length-1;i>=0;i--){

    const p = powerups[i];

    p.pulse += 0.08;

    if(distance(player,p)<player.radius+p.radius){

      if(p.type==="heal"){
        player.health =
          Math.min(
            player.maxHealth,
            player.health+25
          );
      }

      if(p.type==="rapid"){
        player.fireRate =
          Math.max(50,player.fireRate-40);
      }

      if(p.type==="shield"){
        player.shield += 25;
      }

      if(p.type==="bomb"){
        player.bombs++;
      }

      spawnExplosion(p.x,p.y,"#ffff00",20);

      powerups.splice(i,1);
    }

  }

}

function updateCoins(){

  for(let i=coinsList.length-1;i>=0;i--){

    const c = coinsList[i];

    const angle =
      Math.atan2(
        player.y-c.y,
        player.x-c.x
      );

    c.x += Math.cos(angle)*2;
    c.y += Math.sin(angle)*2;

    if(distance(player,c)<20){

      score += 5;

      spawnExplosion(c.x,c.y,"#ffdd00",8);

      coinsList.splice(i,1);
    }

  }

}

function updateParticles(){

  for(let i=particles.length-1;i>=0;i--){

    const p = particles[i];

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.98;
    p.vy *= 0.98;

    p.life--;

    if(p.life<=0){
      particles.splice(i,1);
    }

  }

}

function updateShockwaves(){

  for(let i=shockwaves.length-1;i>=0;i--){

    const s = shockwaves[i];

    s.radius += 8;
    s.life--;

    if(s.life<=0){
      shockwaves.splice(i,1);
    }

  }

}

function updateTrails(){

  for(let i=trails.length-1;i>=0;i--){

    trails[i].life--;

    if(trails[i].life<=0){
      trails.splice(i,1);
    }

  }

}

function checkLevelUp(){

  if(xp>=xpNeeded){

    xp = 0;

    level++;

    xpNeeded += 60;

    gameRunning = false;

    upgradeMenu.style.display = "flex";
  }

}

document.querySelectorAll(".upgradeBtn")
.forEach(btn=>{

  btn.onclick = ()=>{

    const type = btn.dataset.upgrade;

    if(type==="damage"){
      player.damage += 1;
    }

    if(type==="speed"){
      player.speed += 0.5;
    }

    if(type==="firerate"){
      player.fireRate =
        Math.max(40,player.fireRate-15);
    }

    if(type==="multishot"){
      player.multiShot++;
    }

    if(type==="shield"){
      player.shield += 25;
    }

    if(type==="crit"){
      player.critChance += 0.10;
    }

    player.maxHealth += 5;
    player.health = player.maxHealth;

    spawnExplosion(
      player.x,
      player.y,
      "#00ff88",
      40
    );

    upgradeMenu.style.display = "none";

    gameRunning = true;

    loop();

  };

});

function nextWaveCheck(){

  if(enemies.length===0){

    wave++;

    enemyCount += 2;

    for(let i=0;i<enemyCount;i++){

      setTimeout(()=>{
        spawnEnemy();
      },i*250);

    }

  }

}

function updateUI(){

  ui.score.textContent = `Score: ${score}`;
  ui.health.textContent = `Health: ${Math.floor(player.health)}`;
  ui.shield.textContent = `Shield: ${Math.floor(player.shield)}`;
  ui.wave.textContent = `Wave: ${wave}`;
  ui.level.textContent = `Level: ${level}`;
  ui.xp.textContent = `XP: ${xp} / ${xpNeeded}`;
  ui.weapon.textContent = `Weapon: ${player.weapon}`;
  ui.coins.textContent = `Coins: ${score}`;

}

function drawGrid(){

  const size = 50;

  ctx.strokeStyle =
    "rgba(255,255,255,0.05)";

  for(let x=0;x<canvas.width;x+=size){

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();

  }

  for(let y=0;y<canvas.height;y+=size){

    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();

  }

}

function drawBackgroundGlow(){

  const grad =
    ctx.createRadialGradient(
      player.x,
      player.y,
      0,
      player.x,
      player.y,
      260
    );

  grad.addColorStop(
    0,
    "rgba(0,255,255,0.12)"
  );

  grad.addColorStop(
    1,
    "rgba(0,0,0,0)"
  );

  ctx.fillStyle = grad;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

}

function drawTrails(){

  trails.forEach(t=>{

    ctx.globalAlpha = t.life/15;

    ctx.fillStyle = "#00ffff";

    ctx.beginPath();
    ctx.arc(t.x,t.y,10,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = 1;

  });

}

function drawPlayer(){

  ctx.save();

  ctx.translate(player.x,player.y);

  const angle =
    Math.atan2(
      mouse.y-player.y,
      mouse.x-player.x
    );

  ctx.rotate(angle);

  ctx.shadowBlur = 20;
  ctx.shadowColor = player.color;

  ctx.fillStyle = player.color;

  ctx.beginPath();

  ctx.arc(
    0,
    0,
    player.radius,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.fillStyle = "white";
  ctx.fillRect(8,-4,16,8);

  ctx.restore();

}

function drawBullets(){

  bullets.forEach(b=>{

    ctx.shadowBlur = 15;

    ctx.shadowColor =
      b.crit ? "#ff00ff" : "#ffffff";

    ctx.fillStyle =
      b.crit ? "#ff66ff" : "#ffffff";

    ctx.beginPath();

    ctx.arc(
      b.x,
      b.y,
      b.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function drawEnemies(){

  enemies.forEach(e=>{

    ctx.shadowBlur = 20;
    ctx.shadowColor = e.color;
    ctx.fillStyle = e.color;

    ctx.beginPath();

    ctx.arc(
      e.x,
      e.y,
      e.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

    if(e.type==="boss"){

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 6;

      ctx.beginPath();

      ctx.arc(
        e.x,
        e.y,
        e.radius+10,
        0,
        Math.PI*2
      );

      ctx.stroke();

    }

    ctx.fillStyle = "red";

    ctx.fillRect(
      e.x-e.radius,
      e.y-e.radius-12,
      e.radius*2,
      5
    );

    ctx.fillStyle = "lime";

    ctx.fillRect(
      e.x-e.radius,
      e.y-e.radius-12,
      (e.health/e.maxHealth)*e.radius*2,
      5
    );

  });

}

function drawEnemyLasers(){

  enemyLasers.forEach(l=>{

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff0033";
    ctx.fillStyle = "#ff0033";

    ctx.beginPath();

    ctx.arc(
      l.x,
      l.y,
      l.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function drawParticles(){

  particles.forEach(p=>{

    ctx.globalAlpha = p.life/50;

    ctx.fillStyle = p.color;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      p.size,
      0,
      Math.PI*2
    );

    ctx.fill();

    ctx.globalAlpha = 1;

  });

}

function drawPowerups(){

  powerups.forEach(p=>{

    const size =
      p.radius + Math.sin(p.pulse)*3;

    ctx.shadowBlur = 20;

    let color = "#ffff00";

    if(p.type==="heal") color="#00ff00";
    if(p.type==="rapid") color="#ffff00";
    if(p.type==="shield") color="#00ffff";
    if(p.type==="bomb") color="#ff8800";

    ctx.shadowColor = color;
    ctx.fillStyle = color;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      size,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function drawCoins(){

  coinsList.forEach(c=>{

    ctx.fillStyle = "#ffdd00";

    ctx.beginPath();
    ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);
    ctx.fill();

  });

}

function drawShockwaves(){

  shockwaves.forEach(s=>{

    ctx.strokeStyle = s.color;

    ctx.globalAlpha = s.life/40;

    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.stroke();

    ctx.globalAlpha = 1;

  });

}

function drawMinimap(){

  const width = 180;
  const height = 100;

  const x =
    canvas.width-width-20;

  const y = 20;

  ctx.fillStyle =
    "rgba(0,0,0,0.5)";

  ctx.fillRect(
    x,
    y,
    width,
    height
  );

  ctx.strokeStyle = "#00ffff";

  ctx.strokeRect(
    x,
    y,
    width,
    height
  );

  const px =
    x+(player.x/canvas.width)*width;

  const py =
    y+(player.y/canvas.height)*height;

  ctx.fillStyle = "#00ffff";

  ctx.beginPath();

  ctx.arc(px,py,4,0,Math.PI*2);

  ctx.fill();

  enemies.forEach(e=>{

    const ex =
      x+(e.x/canvas.width)*width;

    const ey =
      y+(e.y/canvas.height)*height;

    ctx.fillStyle = "red";

    ctx.beginPath();

    ctx.arc(ex,ey,2,0,Math.PI*2);

    ctx.fill();

  });

}

function gameOver(){

  gameRunning = false;

  if(score > highScore){

    highScore = score;

    localStorage.setItem(
      "neonHighscore",
      highScore
    );

  }

  menu.style.display = "flex";

  menu.innerHTML = `
    <h1>GAME OVER</h1>

    <div class="panel">

      <h2>Score: ${score}</h2>
      <h3>High Score: ${highScore}</h3>

      <br>

      <button id="restartBtn">
        Play Again
      </button>

    </div>
  `;

  document
  .getElementById("restartBtn")
  .onclick = ()=>{
    location.reload();
  };

}

function update(){

  updatePlayer();

  updateBullets();

  updateEnemies();

  updateEnemyLasers();

  updateParticles();

  updatePowerups();

  updateCoins();

  updateShockwaves();

  updateTrails();

  updateUI();

  nextWaveCheck();

  spawnTimer++;

  if(spawnTimer>220){

    spawnTimer = 0;

    if(enemies.length<enemyCount){
      spawnEnemy();
    }

  }

  if(player.health<=0){
    gameOver();
  }

}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.save();

  if(screenShake>0){

    ctx.translate(
      rand(-screenShake,screenShake),
      rand(-screenShake,screenShake)
    );

    screenShake *= 0.9;

  }

  drawGrid();

  drawBackgroundGlow();

  drawTrails();

  drawShockwaves();

  drawPowerups();

  drawParticles();

  drawCoins();

  drawBullets();

  drawEnemyLasers();

  drawEnemies();

  drawPlayer();

  drawMinimap();

  ctx.restore();

}

function loop(){

  if(!gameRunning){
    return;
  }

  update();

  draw();

  requestAnimationFrame(loop);

}

function startGame(){

  resetGame();

  for(let i=0;i<enemyCount;i++){
    spawnEnemy();
  }

  menu.style.display = "none";

  gameRunning = true;

  loop();

}

startBtn.onclick = startGame;

</script>
