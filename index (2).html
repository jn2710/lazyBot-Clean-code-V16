<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Arena 2.5D</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #050816;
    font-family: Arial, sans-serif;
    color: white;
  }

  canvas {
    display: block;
    background: radial-gradient(circle at center, #0b1430 0%, #04060f 70%);
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 16px;
    line-height: 1.4;
    user-select: none;
  }

  #menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
  }

  button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    background: #00d4ff;
  }

  button:hover {
    background: #7deeff;
  }
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="health">Health: 100</div>
  <div id="wave">Wave: 1</div>
</div>

<div id="menu">
  <h1>NEON ARENA 2.5D</h1>
  <button id="startBtn">Start</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

const ui = {
  score: document.getElementById("score"),
  health: document.getElementById("health"),
  wave: document.getElementById("wave")
};

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");

let keys = {};
let mouse = {x:0,y:0,down:false};

let bullets=[], enemies=[], particles=[];

let score=0, wave=1;
let gameRunning=false;

const player = {
  x:0,y:0,
  r:18,
  speed:4,
  health:100,
  lastShot:0,
  fireRate:180
};

// ---------------- 3D helpers ----------------
function depthScale(y){
  return 0.6 + (y / canvas.height) * 0.9;
}

function drawFloorGrid(){
  const centerX = canvas.width/2;
  const centerY = canvas.height*0.35;

  ctx.strokeStyle = "rgba(0,255,255,0.08)";
  ctx.lineWidth = 1;

  for(let i=0;i<20;i++){
    const t = i/20;

    const y = centerY + t * canvas.height;

    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();

    const offset = t * 200;

    ctx.beginPath();
    ctx.moveTo(centerX - offset, y);
    ctx.lineTo(centerX + offset, y);
    ctx.stroke();
  }
}

// ---------------- utils ----------------
function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function rand(a,b){
  return Math.random()*(b-a)+a;
}

// ---------------- spawn ----------------
function spawnEnemy(){
  enemies.push({
    x: rand(0,canvas.width),
    y: rand(0,canvas.height),
    r: rand(12,22),
    speed: rand(1,2)+wave*0.05,
    hp: 2+wave*0.4,
    color:`hsl(${rand(0,360)},90%,60%)`
  });
}

function shoot(){
  const now=Date.now();
  if(now-player.lastShot<player.fireRate) return;
  player.lastShot=now;

  const ang=Math.atan2(mouse.y-player.y,mouse.x-player.x);

  bullets.push({
    x:player.x,
    y:player.y,
    vx:Math.cos(ang)*9,
    vy:Math.sin(ang)*9,
    life:60
  });
}

// ---------------- update ----------------
function updatePlayer(){
  let dx=0,dy=0;

  if(keys["w"]) dy--;
  if(keys["s"]) dy++;
  if(keys["a"]) dx--;
  if(keys["d"]) dx++;

  let len=Math.hypot(dx,dy);
  if(len){
    dx/=len; dy/=len;
  }

  player.x+=dx*player.speed;
  player.y+=dy*player.speed;

  player.x=Math.max(0,Math.min(canvas.width,player.x));
  player.y=Math.max(0,Math.min(canvas.height,player.y));

  if(mouse.down) shoot();
}

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;

    if(b.life<=0){
      bullets.splice(i,1);
      continue;
    }

    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(dist(b,e)<e.r){
        e.hp--;
        bullets.splice(i,1);
        if(e.hp<=0){
          enemies.splice(j,1);
          score+=10;
        }
        break;
      }
    }
  }
}

function updateEnemies(){
  enemies.forEach(e=>{
    const ang=Math.atan2(player.y-e.y,player.x-e.x);
    e.x+=Math.cos(ang)*e.speed;
    e.y+=Math.sin(ang)*e.speed;

    if(dist(player,e)<player.r){
      player.health-=0.5;
    }
  });
}

// ---------------- draw ----------------
function drawPlayer(){
  const s=depthScale(player.y);

  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.scale(s,s);

  ctx.fillStyle="#00ffe5";
  ctx.shadowBlur=20;
  ctx.shadowColor="#00ffe5";

  ctx.beginPath();
  ctx.arc(0,0,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawEnemies(){
  enemies.forEach(e=>{
    const s=depthScale(e.y);

    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.scale(s,s);

    ctx.fillStyle=e.color;
    ctx.shadowBlur=15;
    ctx.shadowColor=e.color;

    ctx.beginPath();
    ctx.arc(0,0,e.r,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    const s=depthScale(b.y);

    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.scale(s,s);

    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(0,0,4,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawFloorGrid();

  drawBullets();
  drawEnemies();
  drawPlayer();
}

// ---------------- loop ----------------
function loop(){
  if(!gameRunning) return;

  updatePlayer();
  updateBullets();
  updateEnemies();

  draw();

  ui.score.textContent="Score: "+score;
  ui.health.textContent="Health: "+Math.max(0,player.health|0);
  ui.wave.textContent="Wave: "+wave;

  requestAnimationFrame(loop);
}

// ---------------- start ----------------
function start(){
  player.x=canvas.width/2;
  player.y=canvas.height/2;

  enemies=[];
  bullets=[];
  score=0;
  wave=1;
  player.health=100;

  for(let i=0;i<6;i++) spawnEnemy();

  menu.style.display="none";
  gameRunning=true;
  loop();
}

startBtn.onclick=start;

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});
addEventListener("mousedown",()=>mouse.down=true);
addEventListener("mouseup",()=>mouse.down=false);

</script>
</body>
</html>
