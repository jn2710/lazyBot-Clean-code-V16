<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Arena Survival ULTRA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#040712;
  font-family:Arial, sans-serif;
  color:white;
}

canvas{
  display:block;
  background:
    radial-gradient(circle at center,#0d1738 0%,#050816 65%);
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  z-index:5;
  font-size:18px;
  line-height:1.6;
  user-select:none;
}

#menu,
#upgradeMenu{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.72);
  gap:15px;
  z-index:10;
}

#upgradeMenu{
  display:none;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  background:#00d4ff;
  color:black;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:#8df3ff;
}

.upgradeBtn{
  width:260px;
}

h1{
  font-size:58px;
  color:#00ffff;
  text-shadow:0 0 25px #00ffff;
}

.panel{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="health">Health: 100</div>
  <div id="wave">Wave: 1</div>
  <div id="level">Level: 1</div>
  <div id="xp">XP: 0 / 100</div>
  <div>Move: WASD / Arrows</div>
  <div>Dash: SHIFT</div>
  <div>Shoot: Mouse</div>
</div>

<div id="menu">
  <h1>NEON ARENA</h1>
  <div class="panel">
    <p>Survive endless enemy waves.</p>
    <br>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<div id="upgradeMenu">
  <h1>LEVEL UP</h1>

  <button class="upgradeBtn" data-upgrade="damage">
    +1 Damage
  </button>

  <button class="upgradeBtn" data-upgrade="speed">
    +0.5 Speed
  </button>

  <button class="upgradeBtn" data-upgrade="firerate">
    Faster Fire Rate
  </button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize",resize);
resize();

const ui = {
  score:document.getElementById("score"),
  health:document.getElementById("health"),
  wave:document.getElementById("wave"),
  level:document.getElementById("level"),
  xp:document.getElementById("xp")
};

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");
const upgradeMenu = document.getElementById("upgradeMenu");

let gameRunning = false;

let keys = {};
let mouse = {
  x:0,
  y:0,
  down:false
};

let bullets = [];
let enemies = [];
let particles = [];
let powerups = [];
let enemyLasers = [];

let score = 0;
let wave = 1;
let enemyCount = 5;
let spawnTimer = 0;
let screenShake = 0;

let level = 1;
let xp = 0;
let xpNeeded = 100;

let highScore =
  localStorage.getItem("neonHighscore") || 0;

const player = {
  x:0,
  y:0,
  radius:18,
  speed:4,
  health:100,
  maxHealth:100,
  fireRate:180,
  damage:1,
  dashCooldown:0,
  dashSpeed:14,
  lastShot:0,
  color:"#00ffe5"
};

window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

window.addEventListener("mousemove",e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mousedown",()=>{
  mouse.down = true;
});

window.addEventListener("mouseup",()=>{
  mouse.down = false;
});

function rand(min,max){
  return Math.random() * (max-min) + min;
}

function distance(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function resetGame(){

  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  enemyLasers = [];

  score = 0;
  wave = 1;
  enemyCount = 5;

  level = 1;
  xp = 0;
  xpNeeded = 100;

  player.x = canvas.width/2;
  player.y = canvas.height/2;

  player.health = 100;
  player.maxHealth = 100;

  player.damage = 1;
  player.speed = 4;
  player.fireRate = 180;
}

function spawnEnemy(){

  const side = Math.floor(Math.random()*4);

  let x,y;

  if(side===0){
    x = rand(0,canvas.width);
    y = -30;
  }
  else if(side===1){
    x = canvas.width + 30;
    y = rand(0,canvas.height);
  }
  else if(side===2){
    x = rand(0,canvas.width);
    y = canvas.height + 30;
  }
  else{
    x = -30;
    y = rand(0,canvas.height);
  }

  const shooter = Math.random() < 0.25;

  enemies.push({
    x,
    y,
    radius:rand(12,24),
    speed:rand(1.1,2.3)+(wave*0.08),
    health:2+(wave*0.5),
    maxHealth:2+(wave*0.5),
    color:`hsl(${rand(0,360)},90%,60%)`,
    shooter,
    cooldown:rand(60,180)
  });
}

function shoot(){

  const now = Date.now();

  if(now-player.lastShot < player.fireRate){
    return;
  }

  player.lastShot = now;

  const angle =
    Math.atan2(
      mouse.y-player.y,
      mouse.x-player.x
    );

  const crit = Math.random() < 0.15;

  bullets.push({
    x:player.x,
    y:player.y,
    vx:Math.cos(angle)*9,
    vy:Math.sin(angle)*9,
    radius:crit ? 8 : 5,
    damage:crit ? player.damage*3 : player.damage,
    crit,
    life:70
  });
}

function spawnExplosion(x,y,color,amount=12){

  for(let i=0;i<amount;i++){

    particles.push({
      x,
      y,
      vx:rand(-3,3),
      vy:rand(-3,3),
      life:rand(20,40),
      size:rand(2,5),
      color
    });

  }

}

function spawnPowerup(x,y){

  const type =
    Math.random() < 0.5
    ? "heal"
    : "rapid";

  powerups.push({
    x,
    y,
    radius:12,
    type,
    pulse:0
  });

}

function updatePlayer(){

  let dx = 0;
  let dy = 0;

  if(keys["w"] || keys["arrowup"]) dy--;
  if(keys["s"] || keys["arrowdown"]) dy++;
  if(keys["a"] || keys["arrowleft"]) dx--;
  if(keys["d"] || keys["arrowright"]) dx++;

  const len = Math.hypot(dx,dy);

  if(len>0){
    dx/=len;
    dy/=len;
  }

  if(keys["shift"] && player.dashCooldown<=0){

    player.x += dx*player.dashSpeed;
    player.y += dy*player.dashSpeed;

    player.dashCooldown = 60;

    spawnExplosion(
      player.x,
      player.y,
      "#00ffff",
      22
    );

  }

  if(player.dashCooldown>0){
    player.dashCooldown--;
  }

  player.x += dx*player.speed;
  player.y += dy*player.speed;

  player.x =
    Math.max(
      player.radius,
      Math.min(canvas.width-player.radius,player.x)
    );

  player.y =
    Math.max(
      player.radius,
      Math.min(canvas.height-player.radius,player.y)
    );

  if(mouse.down){
    shoot();
  }

}

function updateBullets(){

  for(let i=bullets.length-1;i>=0;i--){

    const b = bullets[i];

    b.x += b.vx;
    b.y += b.vy;

    b.life--;

    if(
      b.life<=0 ||
      b.x<-50 ||
      b.y<-50 ||
      b.x>canvas.width+50 ||
      b.y>canvas.height+50
    ){
      bullets.splice(i,1);
      continue;
    }

    for(let j=enemies.length-1;j>=0;j--){

      const e = enemies[j];

      if(distance(b,e) < b.radius+e.radius){

        e.health -= b.damage;

        bullets.splice(i,1);

        spawnExplosion(
          b.x,
          b.y,
          b.crit ? "#ff00ff" : "#ffffff",
          5
        );

        if(e.health<=0){

          score += 10;
          xp += 10;

          screenShake = 10;

          spawnExplosion(
            e.x,
            e.y,
            e.color,
            25
          );

          if(Math.random()<0.18){
            spawnPowerup(e.x,e.y);
          }

          enemies.splice(j,1);

          checkLevelUp();
        }

        break;
      }

    }

  }

}

function updateEnemies(){

  for(let i=enemies.length-1;i>=0;i--){

    const e = enemies[i];

    const angle =
      Math.atan2(
        player.y-e.y,
        player.x-e.x
      );

    e.x += Math.cos(angle)*e.speed;
    e.y += Math.sin(angle)*e.speed;

    if(distance(player,e) < player.radius+e.radius){

      player.health -= 0.2;

      spawnExplosion(
        player.x,
        player.y,
        "#ff0033",
        2
      );

    }

    if(e.shooter){

      e.cooldown--;

      if(e.cooldown<=0){

        enemyLasers.push({
          x:e.x,
          y:e.y,
          vx:Math.cos(angle)*6,
          vy:Math.sin(angle)*6,
          radius:4,
          life:120
        });

        e.cooldown = rand(90,180);

      }

    }

  }

}

function updateEnemyLasers(){

  for(let i=enemyLasers.length-1;i>=0;i--){

    const l = enemyLasers[i];

    l.x += l.vx;
    l.y += l.vy;

    l.life--;

    if(distance(player,l) < player.radius+l.radius){

      player.health -= 10;

      spawnExplosion(
        player.x,
        player.y,
        "#ff0033",
        15
      );

      enemyLasers.splice(i,1);
      continue;
    }

    if(l.life<=0){
      enemyLasers.splice(i,1);
    }

  }

}

function updateParticles(){

  for(let i=particles.length-1;i>=0;i--){

    const p = particles[i];

    p.x += p.vx;
    p.y += p.vy;

    p.life--;

    p.vx *= 0.98;
    p.vy *= 0.98;

    if(p.life<=0){
      particles.splice(i,1);
    }

  }

}

function updatePowerups(){

  for(let i=powerups.length-1;i>=0;i--){

    const p = powerups[i];

    p.pulse += 0.08;

    if(distance(player,p) < player.radius+p.radius){

      if(p.type==="heal"){

        player.health =
          Math.min(
            player.maxHealth,
            player.health+25
          );

      }
      else{

        player.fireRate = 90;

        setTimeout(()=>{
          player.fireRate = 180;
        },5000);

      }

      spawnExplosion(
        p.x,
        p.y,
        "#ffff00",
        20
      );

      powerups.splice(i,1);

    }

  }

}

function checkLevelUp(){

  if(xp >= xpNeeded){

    xp = 0;

    level++;

    xpNeeded += 50;

    gameRunning = false;

    upgradeMenu.style.display = "flex";
  }

}

document.querySelectorAll(".upgradeBtn")
.forEach(btn=>{

  btn.onclick = ()=>{

    const type =
      btn.dataset.upgrade;

    if(type==="damage"){
      player.damage += 1;
    }

    if(type==="speed"){
      player.speed += 0.5;
    }

    if(type==="firerate"){
      player.fireRate =
        Math.max(60,player.fireRate-20);
    }

    player.maxHealth += 5;
    player.health = player.maxHealth;

    spawnExplosion(
      player.x,
      player.y,
      "#00ff88",
      40
    );

    upgradeMenu.style.display = "none";

    gameRunning = true;

    loop();

  };

});

function nextWaveCheck(){

  if(enemies.length===0){

    wave++;
    enemyCount += 2;

    for(let i=0;i<enemyCount;i++){

      setTimeout(()=>{
        spawnEnemy();
      },i*250);

    }

  }

}

function updateUI(){

  ui.score.textContent =
    `Score: ${score}`;

  ui.health.textContent =
    `Health: ${Math.max(0,Math.floor(player.health))}`;

  ui.wave.textContent =
    `Wave: ${wave}`;

  ui.level.textContent =
    `Level: ${level}`;

  ui.xp.textContent =
    `XP: ${xp} / ${xpNeeded}`;

}

function drawGrid(){

  const size = 50;

  ctx.strokeStyle =
    "rgba(255,255,255,0.05)";

  for(let x=0;x<canvas.width;x+=size){

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();

  }

  for(let y=0;y<canvas.height;y+=size){

    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();

  }

}

function drawBackgroundGlow(){

  const grad =
    ctx.createRadialGradient(
      player.x,
      player.y,
      0,
      player.x,
      player.y,
      260
    );

  grad.addColorStop(
    0,
    "rgba(0,255,255,0.12)"
  );

  grad.addColorStop(
    1,
    "rgba(0,0,0,0)"
  );

  ctx.fillStyle = grad;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

}

function drawPlayer(){

  ctx.save();

  ctx.translate(player.x,player.y);

  const angle =
    Math.atan2(
      mouse.y-player.y,
      mouse.x-player.x
    );

  ctx.rotate(angle);

  ctx.shadowBlur = 20;
  ctx.shadowColor = player.color;

  ctx.fillStyle = player.color;

  ctx.beginPath();
  ctx.arc(
    0,
    0,
    player.radius,
    0,
    Math.PI*2
  );
  ctx.fill();

  ctx.fillStyle = "white";

  ctx.fillRect(8,-4,16,8);

  ctx.restore();

}

function drawBullets(){

  bullets.forEach(b=>{

    ctx.shadowBlur = 15;

    ctx.shadowColor =
      b.crit
      ? "#ff00ff"
      : "#ffffff";

    ctx.fillStyle =
      b.crit
      ? "#ff66ff"
      : "#ffffff";

    ctx.beginPath();

    ctx.arc(
      b.x,
      b.y,
      b.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function drawEnemies(){

  enemies.forEach(e=>{

    ctx.shadowBlur = 18;
    ctx.shadowColor = e.color;
    ctx.fillStyle = e.color;

    ctx.beginPath();

    ctx.arc(
      e.x,
      e.y,
      e.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

    if(e.shooter){

      ctx.strokeStyle = "#ff0033";
      ctx.lineWidth = 3;

      ctx.beginPath();

      ctx.arc(
        e.x,
        e.y,
        e.radius+5,
        0,
        Math.PI*2
      );

      ctx.stroke();

    }

    ctx.fillStyle = "red";

    ctx.fillRect(
      e.x-e.radius,
      e.y-e.radius-10,
      e.radius*2,
      4
    );

    ctx.fillStyle = "lime";

    ctx.fillRect(
      e.x-e.radius,
      e.y-e.radius-10,
      (e.health/e.maxHealth)*e.radius*2,
      4
    );

  });

}

function drawEnemyLasers(){

  enemyLasers.forEach(l=>{

    ctx.shadowBlur = 14;
    ctx.shadowColor = "#ff0033";
    ctx.fillStyle = "#ff0033";

    ctx.beginPath();

    ctx.arc(
      l.x,
      l.y,
      l.radius,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function drawParticles(){

  particles.forEach(p=>{

    ctx.globalAlpha = p.life/40;

    ctx.fillStyle = p.color;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      p.size,
      0,
      Math.PI*2
    );

    ctx.fill();

    ctx.globalAlpha = 1;

  });

}

function drawPowerups(){

  powerups.forEach(p=>{

    const size =
      p.radius + Math.sin(p.pulse)*3;

    ctx.shadowBlur = 20;

    ctx.shadowColor =
      p.type==="heal"
      ? "#00ff00"
      : "#ffff00";

    ctx.fillStyle =
      p.type==="heal"
      ? "#00ff00"
      : "#ffff00";

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      size,
      0,
      Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";

    ctx.fillText(
      p.type==="heal" ? "+" : "R",
      p.x,
      p.y+4
    );

  });

}

function drawMinimap(){

  const width = 180;
  const height = 100;

  const x =
    canvas.width-width-20;

  const y = 20;

  ctx.fillStyle =
    "rgba(0,0,0,0.5)";

  ctx.fillRect(
    x,
    y,
    width,
    height
  );

  ctx.strokeStyle = "#00ffff";

  ctx.strokeRect(
    x,
    y,
    width,
    height
  );

  const px =
    x+(player.x/canvas.width)*width;

  const py =
    y+(player.y/canvas.height)*height;

  ctx.fillStyle = "#00ffff";

  ctx.beginPath();

  ctx.arc(
    px,
    py,
    4,
    0,
    Math.PI*2
  );

  ctx.fill();

  enemies.forEach(e=>{

    const ex =
      x+(e.x/canvas.width)*width;

    const ey =
      y+(e.y/canvas.height)*height;

    ctx.fillStyle = "red";

    ctx.beginPath();

    ctx.arc(
      ex,
      ey,
      2,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

}

function gameOver(){

  gameRunning = false;

  if(score > highScore){

    highScore = score;

    localStorage.setItem(
      "neonHighscore",
      highScore
    );

  }

  menu.style.display = "flex";

  menu.innerHTML = `
    <h1>GAME OVER</h1>

    <div class="panel">

      <h2>Score: ${score}</h2>
      <h3>High Score: ${highScore}</h3>

      <br>

      <button id="restartBtn">
        Play Again
      </button>

    </div>
  `;

  document
  .getElementById("restartBtn")
  .onclick = ()=>{

    location.reload();

  };

}

function update(){

  updatePlayer();

  updateBullets();

  updateEnemies();

  updateEnemyLasers();

  updateParticles();

  updatePowerups();

  updateUI();

  nextWaveCheck();

  spawnTimer++;

  if(spawnTimer>240){

    spawnTimer = 0;

    if(enemies.length<enemyCount){
      spawnEnemy();
    }

  }

  if(player.health<=0){
    gameOver();
  }

}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.save();

  if(screenShake>0){

    ctx.translate(
      rand(-screenShake,screenShake),
      rand(-screenShake,screenShake)
    );

    screenShake *= 0.9;

  }

  drawGrid();

  drawBackgroundGlow();

  drawPowerups();

  drawParticles();

  drawBullets();

  drawEnemyLasers();

  drawEnemies();

  drawPlayer();

  drawMinimap();

  ctx.restore();

}

function loop(){

  if(!gameRunning){
    return;
  }

  update();

  draw();

  requestAnimationFrame(loop);

}

function startGame(){

  resetGame();

  for(let i=0;i<enemyCount;i++){
    spawnEnemy();
  }

  menu.style.display = "none";

  gameRunning = true;

  loop();

}

startBtn.onclick = startGame;

</script>
</body>
</html>
